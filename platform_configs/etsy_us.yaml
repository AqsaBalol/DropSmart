# Etsy USA Platform Configuration
# Used by: Competitor Agent, Fee Agent, Report Agent, Margin Calculator Agent
# This config defines all fees, marketplace rules, and constraints for Etsy USA sellers

marketplace_name: "Etsy USA"
marketplace_id: "etsy_us"
region: "US"
currency: "USD"

# Business models supported on this platform
# Used by: Orchestrator Agent (validates user input)
# NOTE: Etsy has NO in-house fulfillment program. FBM not supported.
supported_business_models:
  - dropshipping  # Supplier ships directly to customer
  - fbs           # Seller holds inventory and ships

# Fee categories the Fee Agent must search for
# Each fee here is REQUIRED to appear in final output before Margin Calculator runs
# Used by: Fee Agent (search queries), Margin Calculator Agent (line-by-line breakdown)
fee_categories:
  - name: "Listing Fee"
    type: "flat_per_unit_sold"
    amount: 0.20
    applies_to: "per_unit_sold"
    note: "USD $0.20 charged per unit sold from a multi-quantity listing. Also charged per listing when published (even if item never sells). Renews every 4 months at $0.20. Fee Agent note: if listing doesn't sell for 4 months, $0.20 is recharged automatically. This is a hidden cost sellers often miss."

  - name: "Transaction Fee"
    type: "percentage"
    applies_to: "item_price_plus_shipping"
    rate: 6.5
    note: "6.5% of total order amount. Includes item price AND shipping cost. Sellers frequently underestimate this because they forget it applies to shipping. Fee Agent must emphasize that Transaction Fee covers both item and shipping."

  - name: "Payment Processing Fee"
    type: "percentage_plus_flat"
    applies_to: "gross_order_amount"
    rate: 3.0
    flat: 0.25
    note: "3% + $0.25 per transaction for US sellers. Applied on gross order amount including tax. Some sellers confuse this with Transaction Fee — they are separate fees. Fee Agent must calculate as (order_amount * 0.03) + 0.25."

  - name: "Offsite Ads Fee"
    type: "percentage"
    applies_to: "attributed_order_total"
    note: "Mandatory vs optional based on annual sales threshold: Below $10,000 annual sales: 15% fee BUT seller can opt out. Above $10,000 annual sales: 12% fee AND MANDATORY — seller cannot opt out ever. Only charged when sale comes from Etsy-placed external ad (Google, Pinterest, etc). Fee Agent must search current threshold and communicate this mandatory cutoff to seller."

# Search query templates for Fee Agent
# Fee Agent will substitute {product_category} at runtime with the actual category
# Multiple queries ensure multi-source verification per spec
# Used by: Fee Agent (searching for fees, multi-source verification)
fee_search_queries:
  - "Etsy seller fees complete breakdown 2026"
  - "Etsy transaction fee listing fee payment processing 2026"
  - "Etsy offsite ads fee 2026 opt out threshold"
  - "site:etsy.com/legal/fees current fee schedule"

# Listing constraints for the Report Agent
# Report Agent uses these to generate marketplace-optimized listing draft within limits
# NOTE: Etsy uses description-based listings, NOT bullet points like Amazon/Walmart
# Used by: Report Agent (generates title and description within these limits)
listing_constraints:
  title_max_chars: 140
  bullet_count: 0          # Etsy does not use bullets — uses narrative description instead
  description_max_chars: 5000
  title_style: "artisan-conversational"
  note: "Etsy title should be conversational and keyword-rich. Example: 'Handmade Ceramic Coffee Mug with Gold Trim, Unique Gift' instead of 'Ceramic Mug'. Etsy favors handmade, vintage, unique, personalized items — mass-produced items perform poorly. Listings use narrative descriptions not structured bullet points."

# Supplier source hints for the Supplier Agent
# These guide search query construction — not hardcoded supplier lists
# Used by: Supplier Agent (search query templates)
supplier_sources:
  - "Alibaba"
  - "AliExpress"
  - "CJDropshipping"
  - "Print-on-demand suppliers (Printful, Printify, Teespring)"
  - "Local artisan suppliers"
  - "Wholesale craft suppliers"

# Special notes and rules specific to Etsy USA
# Used by: Risk Assessor Agent (assess market factors, product category suitability)
# Used by: Report Agent (recommendations section)
special_notes:
  - "Etsy has NO in-house fulfillment program — sellers MUST use FBS or hire third-party 3PL. FBM not supported. This limits scale vs Amazon/Walmart but keeps overhead low for new sellers."
  - "Transaction fee applies to SHIPPING amount too — many sellers miss this. If selling with $5 shipping, Transaction Fee is 6.5% × ($item_price + $5), not just on item price."
  - "Offsite Ads mandatory above $10,000 annual sales — seller loses ability to opt out. At exactly $10,000 threshold, seller enters mandatory 12% offsite ads. Plan for this cost jump."
  - "Etsy strongly favors handmade, vintage, unique, and personalized items — mass-produced items compete poorly. Algorithm surfaces artisan items. If product is commodity, expect low ranking and need higher price/differentiation."
  - "Q4 holiday season (November-December) is peak for most Etsy categories — double/triple sales volume typical. Many seasonal, gift-related, and personalized categories thrive in Q4."
  - "Shop setup fee $15-$29 one-time (introduced September 2024) — charge once when opening new shop. Include in break-even if planning multiple shops."
  - "Buyer reviews and shop reputation are critical on Etsy — new sellers have uphill battle. Fast shipping and perfect communication are table stakes. Consider competitive pricing to build initial reviews."
  - "Etsy favors shops with consistent output and fast shipping — algorithm rewards active sellers. Dormant shops rank lower in search."
  - "Personalization (engraving, custom colors, names) increases price and margins — Etsy buyers willingly pay premium for custom items."
